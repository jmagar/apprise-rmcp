name: apprise-mcp

services:
  apprise-mcp:
    extends:
      file: docker-compose.prod.yml
      service: apprise-mcp
    image: apprise-mcp:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  apprise-mcp:
    name: ${DOCKER_NETWORK:-apprise-mcp}

volumes:
  apprise-data:
    name: ${APPRISE_DATA_VOLUME:-apprise-mcp-data}
