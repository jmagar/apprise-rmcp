pre-commit:
  parallel: true
  commands:
    diff_check:
      run: git --no-pager diff --check --cached
    toml_fmt:
      glob: "*.toml"
      run: taplo check {staged_files}
    env_guard:
      run: bash scripts/block-env-commits.sh
    version_sync:
      run: bash scripts/check-version-sync.sh
    ci_policy:
      run: bash scripts/check-ci-policy.sh
