name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  prepare-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scripts/openwiki/package-lock.json
      - name: Install locked OpenWiki without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund --prefix scripts/openwiki
      - name: Stage reviewed toolchain
        run: tar -C scripts/openwiki -czf openwiki-toolchain.tar.gz node_modules package.json package-lock.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openwiki-toolchain
          path: openwiki-toolchain.tar.gz
          retention-days: 1

  update:
    needs: prepare-toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: openwiki-toolchain
          path: ${{ runner.temp }}
      - name: Restore isolated OpenWiki toolchain
        run: |
          mkdir -p "${RUNNER_TEMP}/openwiki"
          tar -xzf "${RUNNER_TEMP}/openwiki-toolchain.tar.gz" -C "${RUNNER_TEMP}/openwiki"
          echo "${RUNNER_TEMP}/openwiki/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.120.242.29
      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
        run: |
          set -euo pipefail
          response="$(mktemp)"
          trap 'rm -f "$response"' EXIT
          status="$(curl --silent --show-error --fail-with-body --connect-timeout 5 --max-time 15 --max-redirs 0 --output "$response" --write-out '%{http_code}' --header "Authorization: Bearer ${OPENAI_COMPATIBLE_API_KEY}" "${OPENAI_COMPATIBLE_BASE_URL%/}/models" || true)"
          if [[ "$status" != "200" ]]; then
            echo "::error::OpenWiki API preflight failed with HTTP ${status}"
            head -c 300 "$response"
            exit 1
          fi
      - name: Run OpenWiki
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
          OPENWIKI_MODEL_ID: gpt-5.3-codex-spark
        run: openwiki --update --print
      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: Automated OpenWiki documentation update.
