name: Docker Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_sha || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jmagar/apprise-mcp

jobs:
  build-scan-push:
    if: github.event_name == 'release' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.release.tag_name }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: release
        name: Resolve immutable and channel tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          short="${sha:0:12}"
          image="${REGISTRY}/${IMAGE_NAME}"
          tags="${image}:sha-${short}"
          if [[ "$EVENT_NAME" == release ]]; then
            version="${RELEASE_TAG#v}"
            [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || exit 1
            tags+=$'\n'"${image}:${version}"
          else
            tags+=$'\n'"${image}:latest"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo EOF
            echo "canonical=${image}:sha-${short}"
          } >> "$GITHUB_OUTPUT"
      - name: Build exact local image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: config/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.release.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Blocking vulnerability scan before registry login or push
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master reviewed 2026-07-18
        with:
          image-ref: ${{ steps.release.outputs.canonical }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload scan result
        if: always()
        uses: github/codeql-action/upload-sarif@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66 # v3
        with:
          sarif_file: trivy-results.sarif
      - name: Generate SBOM from scanned local image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.release.outputs.canonical }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false
      - name: Log in only after all pre-publication gates pass
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push the exact scanned image under all resolved tags
        env:
          TAGS: ${{ steps.release.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do docker push "$tag"; done <<< "$TAGS"
          digest="$(docker buildx imagetools inspect "${{ steps.release.outputs.canonical }}" --format '{{.Manifest.Digest}}')"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        id: pushed
      - name: Attest SBOM to the pushed digest
        uses: actions/attest-sbom@10926c72720ffc3f7b666661c8e55b1344e2a365 # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.pushed.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-sbom-${{ github.run_id }}
          path: sbom.spdx.json
          retention-days: 90
