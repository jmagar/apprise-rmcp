name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-meta:
    runs-on: [self-hosted, unraid]
    timeout-minutes: 5
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          [[ "$EVENT_NAME" == release ]] || { echo "::error::release workflow requires a published release event"; exit 1; }
          tag="$EVENT_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || { echo "::error::invalid release tag: $tag"; exit 1; }
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

  preflight:
    needs: release-meta
    runs-on: [self-hosted, unraid]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
          fetch-depth: 0
          persist-credentials: false
      - name: Require tag commit on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main
      - name: Validate every release version before publication
        env:
          EXPECTED_VERSION: ${{ needs.release-meta.outputs.tag_name }}
        run: bash scripts/check-version-sync.sh
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt,clippy
      - uses: taiki-e/install-action@6d9ce389421e24f7b73aff5e841bbe5a6b4c974c # nextest
        with:
          tool: nextest@0.9.100
      - uses: taiki-e/install-action@6d9ce389421e24f7b73aff5e841bbe5a6b4c974c # cargo-audit
        with:
          tool: cargo-audit@0.22.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo nextest run --workspace --all-features --profile ci
      # Vulnerabilities are always fatal; deny unsound advisories explicitly.
      # The locked graph currently carries a tracked yanked-only spin warning.
      - run: cargo audit --deny unsound
      - run: bash scripts/check-ci-policy.sh
      - run: bash scripts/validate-plugin-layout.sh
      - run: bash tests/docs-contract.sh
      - run: shellcheck install.sh entrypoint.sh scripts/*.sh tests/*.sh
      - run: npm test --prefix packages/apprise-rmcp
      - run: npm run check --prefix packages/apprise-rmcp

  build:
    needs: [release-meta, preflight]
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: rapprise-linux-x86_64
            archive: rapprise-x86_64.tar.gz
            ext: ""
          - target: x86_64-pc-windows-msvc
            artifact: rapprise-windows-x86_64.exe
            archive: rapprise-windows-x86_64.tar.gz
            ext: ".exe"
    runs-on: [self-hosted, unraid]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@6d9ce389421e24f7b73aff5e841bbe5a6b4c974c # nextest
        if: matrix.target == 'x86_64-pc-windows-msvc'
        with:
          tool: cargo-xwin@0.20.2
      - name: Build Linux
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }} --bin rapprise
      - name: Build Windows
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo xwin build --release --locked --target ${{ matrix.target }} --bin rapprise
      - name: Stage archive and published digest
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/rapprise${{ matrix.ext }}" "${{ matrix.artifact }}"
          mkdir archive
          cp "${{ matrix.artifact }}" "archive/rapprise${{ matrix.ext }}"
          tar -C archive -czf "${{ matrix.archive }}" "rapprise${{ matrix.ext }}"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - id: attestation
        name: Attest the exact archive consumed by installers
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: ${{ matrix.archive }}
      - name: Stage offline attestation bundle
        run: cp "${{ steps.attestation.outputs.bundle-path }}" "${{ matrix.archive }}.sigstore.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
            ${{ matrix.archive }}.sigstore.json

  build-installer:
    needs: [release-meta, preflight]
    runs-on: [self-hosted, unraid]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
          persist-credentials: false
      - run: |
          cp scripts/install.sh rapprise-installer.sh
          sha256sum rapprise-installer.sh > rapprise-installer.sh.sha256
      - id: attestation
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: rapprise-installer.sh
      - run: cp "${{ steps.attestation.outputs.bundle-path }}" rapprise-installer.sh.sigstore.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rapprise-installer
          path: |
            rapprise-installer.sh
            rapprise-installer.sh.sha256
            rapprise-installer.sh.sigstore.json

  publish-release:
    needs: [release-meta, preflight, build, build-installer]
    runs-on: [self-hosted, unraid]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/release-assets
          merge-multiple: true
      - name: Verify and aggregate release checksums
        working-directory: dist/release-assets
        run: |
          set -euo pipefail
          for checksum in ./*.sha256; do sha256sum --check "$checksum"; done
          cat -- ./*.sha256 | sort -k2 > SHA256SUMS
      - name: Attach verified release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag_name }}
          files: dist/release-assets/*

  npm:
    needs: [release-meta, preflight, publish-release]
    runs-on: [self-hosted, unraid]
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.5.2 --ignore-scripts
      - run: npm test --prefix packages/apprise-rmcp
      - run: npm run check --prefix packages/apprise-rmcp
      - run: npm pack --dry-run --json ./packages/apprise-rmcp
      - id: published
        env:
          VERSION: ${{ needs.release-meta.outputs.tag_name }}
        run: |
          version="${VERSION#v}"
          if npm view "apprise-rmcp@${version}" version >/dev/null 2>&1; then echo exists=true >> "$GITHUB_OUTPUT"; else echo exists=false >> "$GITHUB_OUTPUT"; fi
      - name: Publish using npm trusted publishing
        if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public ./packages/apprise-rmcp
      - name: Smoke published launcher
        env:
          VERSION: ${{ needs.release-meta.outputs.tag_name }}
        run: npm_config_cache="$(mktemp -d)" npx -y "apprise-rmcp@${VERSION#v}" --version
