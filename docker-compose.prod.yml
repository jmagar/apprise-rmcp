name: apprise-mcp

x-common-service: &common-service
  networks: [apprise-mcp]
  restart: unless-stopped
  init: true
  user: "1000:1000"
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - /tmp:size=16m,mode=1777
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  apprise-mcp:
    <<: *common-service
    image: ${APPRISE_MCP_IMAGE:-ghcr.io/jmagar/apprise-mcp:invalid-set-APPRISE_MCP_IMAGE-to-a-digest}
    container_name: apprise-mcp
    env_file:
      - path: .env
        required: false
    ports:
      - "${APPRISE_MCP_HOST_PORT:-40050}:40050/tcp"
    volumes:
      - ${APPRISE_DATA_DIR:-${HOME}/.apprise}:/data
    healthcheck:
      test: [CMD, curl, --fail, --silent, --show-error, --max-time, "5", http://localhost:40050/health]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  apprise-mcp:
    name: ${DOCKER_NETWORK:-apprise-mcp}
